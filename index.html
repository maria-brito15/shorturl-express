<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShortURL</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-body: #f0f4fa;
        --bg-surface: #ffffff;
        --bg-surface-hover: #f0f6ff;
        --text-primary: #0f2a5e;
        --text-secondary: #4a6490;
        --text-tertiary: #8fa3c0;
        --border: #dde7f5;
        --border-hover: #b0c8f0;
        --primary: #1a6ef5;
        --primary-hover: #1558cc;
        --primary-light: #e6f0ff;
        --primary-dark: #0d3d99;
        --shadow-card: 0 8px 24px rgba(15, 42, 94, 0.1);
        --shadow-btn: 0 4px 12px rgba(26, 110, 245, 0.28);
        --radius-card: 16px;
        --radius-btn: 12px;
        --radius-pill: 9999px;
        --font-display: "Syne", sans-serif;
        --font-body: "Plus Jakarta Sans", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--bg-body);
        font-family: var(--font-body);
        color: var(--text-primary);
        min-height: 100vh;
      }

      /* header */
      .site-header {
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border);
        padding: 1rem 0;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .brand {
        font-family: var(--font-display);
        font-size: 1.4rem;
        font-weight: 800;
        color: var(--primary);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .total-badge {
        font-size: 12px;
        font-weight: 600;
        background: var(--primary-light);
        color: var(--primary-dark);
        border-radius: var(--radius-pill);
        padding: 3px 12px;
      }

      /* hero */
      .hero {
        padding: 3.5rem 0 2.5rem;
        text-align: center;
      }

      .hero h1 {
        font-family: var(--font-display);
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 800;
        color: var(--text-primary);
        line-height: 1.15;
        margin-bottom: 0.75rem;
      }

      .hero h1 span {
        color: var(--primary);
      }

      .hero p {
        font-size: 1rem;
        color: var(--text-secondary);
        max-width: 440px;
        margin: 0 auto 2rem;
      }

      /* form card */
      .form-card {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-card);
        padding: 1.75rem;
        max-width: 620px;
        margin: 0 auto 2.5rem;
      }

      .form-card .form-control {
        border: 1.5px solid var(--border);
        border-radius: var(--radius-btn);
        font-family: var(--font-body);
        font-size: 14px;
        padding: 10px 14px;
        color: var(--text-primary);
        background: var(--bg-body);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      .form-card .form-control:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(26, 110, 245, 0.12);
        background: #fff;
        outline: none;
      }

      .form-card .form-control::placeholder {
        color: var(--text-tertiary);
      }

      .btn-encurtar {
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: var(--radius-btn);
        font-family: var(--font-body);
        font-weight: 600;
        font-size: 14px;
        padding: 10px 22px;
        box-shadow: var(--shadow-btn);
        transition:
          background 0.2s,
          transform 0.15s;
        white-space: nowrap;
        cursor: pointer;
      }

      .btn-encurtar:hover:not(:disabled) {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }

      .btn-encurtar:disabled {
        opacity: 0.55;
        cursor: default;
      }

      .erro-msg {
        font-size: 13px;
        color: #dc3545;
        margin-top: 0.6rem;
        display: none;
      }

      /* section */
      .section-title {
        font-family: var(--font-display);
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 1rem;
      }

      /* url card */
      .url-card {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        box-shadow: 0 2px 8px rgba(15, 42, 94, 0.06);
        padding: 1rem 1.25rem;
        margin-bottom: 0.75rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        transition:
          box-shadow 0.2s,
          border-color 0.2s,
          opacity 0.2s;
      }

      .url-card:hover {
        border-color: var(--border-hover);
        box-shadow: var(--shadow-card);
      }

      .url-card.novo {
        border-color: var(--primary);
        background: var(--primary-light);
        animation: fadeSlide 0.35s ease;
      }

      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .url-icon {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        background: var(--primary-light);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: var(--primary);
      }

      .url-info {
        min-width: 0;
        flex: 1;
      }

      .url-short {
        font-size: 14px;
        font-weight: 600;
        color: var(--primary);
        text-decoration: none;
      }

      .url-short:hover {
        text-decoration: underline;
        color: var(--primary-hover);
      }

      .url-original {
        font-size: 12px;
        color: var(--text-tertiary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: block;
        max-width: 100%;
        margin-top: 1px;
      }

      .badge-clicks {
        display: inline-block;
        margin-top: 5px;
        font-size: 11px;
        font-weight: 600;
        background: var(--primary-light);
        color: var(--primary-dark);
        border-radius: var(--radius-pill);
        padding: 2px 9px;
      }

      .url-actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }

      .btn-icon {
        border: 1px solid var(--border);
        background: var(--bg-surface);
        border-radius: 8px;
        padding: 5px 11px;
        font-size: 12px;
        font-family: var(--font-body);
        color: var(--text-secondary);
        cursor: pointer;
        transition:
          border-color 0.15s,
          color 0.15s,
          background 0.15s;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .btn-icon:hover {
        border-color: var(--primary);
        color: var(--primary);
        background: var(--primary-light);
      }
      .btn-icon.copiado {
        border-color: #198754;
        color: #198754;
        background: #f0fff4;
      }
      .btn-icon.del:hover {
        border-color: #dc3545;
        color: #dc3545;
        background: #fff5f5;
      }

      /* empty */
      .empty-state {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--text-tertiary);
        font-size: 14px;
      }

      .empty-state svg {
        opacity: 0.35;
        margin-bottom: 0.75rem;
      }

      /* footer */
      .site-footer {
        text-align: center;
        font-size: 12px;
        color: var(--text-tertiary);
        padding: 2rem 0;
        border-top: 1px solid var(--border);
        margin-top: 2rem;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container d-flex align-items-center justify-content-between">
        <a href="/" class="brand">
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"
            />
            <path
              d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"
            />
          </svg>
          ShortURL
        </a>
        <span class="total-badge" id="total-badge">0 links</span>
      </div>
    </header>

    <section class="hero">
      <div class="container">
        <h1>Encurte qualquer<br /><span>link em segundos</span></h1>
        <p>
          Cole sua URL longa abaixo e gere um link curto com contagem de
          cliques.
        </p>

        <div class="form-card">
          <form id="form">
            <div class="d-flex gap-2">
              <input
                id="input"
                type="text"
                class="form-control"
                placeholder="https://exemplo.com/url-muito-longa-aqui"
              />
              <button type="submit" id="btn" class="btn-encurtar">
                Encurtar
              </button>
            </div>
            <p class="erro-msg" id="erro"></p>
          </form>
        </div>
      </div>
    </section>

    <main class="container pb-4" style="max-width: 680px">
      <p class="section-title">Seus links</p>
      <div id="lista"></div>
      <div class="empty-state" id="vazio" style="display: none">
        <svg
          width="40"
          height="40"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.4"
          display="block"
          style="margin: 0 auto 0.75rem"
        >
          <path
            d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"
          />
          <path
            d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"
          />
        </svg>
        <p>Nenhum link criado ainda.<br />Encurte sua primeira URL acima.</p>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">ShortURL &middot; Express + MongoDB + Redis</div>
    </footer>

    <script>
      const BASE_URL = "http://localhost:3000";

      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const btn = document.getElementById("btn");
      const erroEl = document.getElementById("erro");
      const lista = document.getElementById("lista");
      const vazio = document.getElementById("vazio");
      const totalBadge = document.getElementById("total-badge");

      let total = 0;

      function atualizarTotal(delta) {
        total += delta;
        totalBadge.textContent = `${total} ${total === 1 ? "link" : "links"}`;
      }

      function setErro(msg) {
        erroEl.textContent = msg;
        erroEl.style.display = msg ? "block" : "none";
      }

      function atualizarVazio() {
        vazio.style.display = lista.children.length === 0 ? "block" : "none";
      }

      function formatClicks(n) {
        return n >= 1000 ? (n / 1000).toFixed(1) + "k" : n;
      }

      function criarCard(url, destacar = false) {
        const div = document.createElement("div");
        div.className = "url-card" + (destacar ? " novo" : "");
        div.dataset.code = url.code;

        div.innerHTML = `
        <div class="url-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
        </div>
        <div class="url-info">
          <a class="url-short" href="${url.shortUrl}" target="_blank" rel="noopener">${url.shortUrl}</a>
          <span class="url-original" title="${url.originalUrl}">${url.originalUrl}</span>
          <span class="badge-clicks">👁 ${formatClicks(url.clicks)} cliques</span>
        </div>
        <div class="url-actions">
          <button class="btn-icon btn-copiar">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copiar
          </button>
          <button class="btn-icon del btn-del">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
            </svg>
            Remover
          </button>
        </div>
      `;

        const btnCopiar = div.querySelector(".btn-copiar");
        btnCopiar.addEventListener("click", async () => {
          await navigator.clipboard.writeText(url.shortUrl);
          btnCopiar.classList.add("copiado");
          btnCopiar.innerHTML = `
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg> Copiado
        `;
          setTimeout(() => {
            btnCopiar.classList.remove("copiado");
            btnCopiar.innerHTML = `
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg> Copiar
          `;
          }, 2000);
        });

        div.querySelector(".btn-del").addEventListener("click", async () => {
          const res = await fetch(`${BASE_URL}/api/urls/${url.code}`, {
            method: "DELETE",
          });
          if (res.ok) {
            div.style.opacity = "0";
            setTimeout(() => {
              div.remove();
              atualizarVazio();
              atualizarTotal(-1);
            }, 200);
          }
        });

        if (destacar) setTimeout(() => div.classList.remove("novo"), 3000);

        return div;
      }

      async function carregar() {
        try {
          const res = await fetch(`${BASE_URL}/api/urls`);
          const data = await res.json();
          total = data.total;
          totalBadge.textContent = `${total} ${total === 1 ? "link" : "links"}`;
          data.urls.forEach((url) => lista.appendChild(criarCard(url)));
        } catch {}
        atualizarVazio();
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        setErro("");
        const url = input.value.trim();
        if (!url) return;

        btn.disabled = true;
        btn.textContent = "Encurtando…";

        try {
          const res = await fetch(`${BASE_URL}/api/urls`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url }),
          });
          const data = await res.json();

          if (!res.ok) {
            setErro(
              data.detalhes?.url?.[0] ?? data.error ?? "Erro ao encurtar URL",
            );
            return;
          }

          lista.prepend(criarCard(data, true));
          atualizarVazio();
          atualizarTotal(1);
          input.value = "";
        } catch {
          setErro("Não foi possível conectar ao servidor");
        } finally {
          btn.disabled = false;
          btn.textContent = "Encurtar";
        }
      });

      carregar();
    </script>
  </body>
</html>
